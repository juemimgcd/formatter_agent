services:
  app:
    build:
      context: .
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      APP_DEBUG: "false"
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/rebuild_agent
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      CELERY_TASK_EXPIRES_SECONDS: "300"
    command: >
      sh -c "uv run alembic upgrade head &&
      uv run uvicorn main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    volumes:
      - ./outputs:/app/outputs
      - ./storage:/app/storage
    restart: unless-stopped

  worker:
    build:
      context: .
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    environment:
      APP_DEBUG: "false"
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/rebuild_agent
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      CELERY_TASK_EXPIRES_SECONDS: "300"
    command: >
      sh -c "uv run celery -A conf.celery_app:celery_app worker --loglevel=INFO -Q search_queue"
    volumes:
      - ./outputs:/app/outputs
      - ./storage:/app/storage
    restart: unless-stopped

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: rebuild_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rebuild_agent"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  postgres_data:
